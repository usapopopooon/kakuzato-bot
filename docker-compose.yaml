services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DISCORD_TOKEN: ${DISCORD_TOKEN:?set DISCORD_TOKEN}
      EVENT_LOG_CONFIG_PATH: /app/data/event-log-configs.json
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HEALTHCHECK_FILE: /tmp/kakuzato-bot-ready
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "node", "dist/app/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 30s

volumes:
  bot-data:
