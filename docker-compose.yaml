services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kakuzato_bot}
      POSTGRES_USER: ${POSTGRES_USER:-kakuzato}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    mem_limit: ${DB_MEMORY_LIMIT:-256m}
    cpus: '${DB_CPUS:-0.25}'
    deploy:
      resources:
        limits:
          memory: ${DB_MEMORY_LIMIT:-256m}
          cpus: '${DB_CPUS:-0.25}'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: migrator
    restart: 'no'
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kakuzato}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-kakuzato_bot}
    mem_limit: ${MIGRATE_MEMORY_LIMIT:-384m}
    cpus: '${MIGRATE_CPUS:-0.50}'
    deploy:
      resources:
        limits:
          memory: ${MIGRATE_MEMORY_LIMIT:-384m}
          cpus: '${MIGRATE_CPUS:-0.50}'

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-kakuzato}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-kakuzato_bot}
      DISCORD_TOKEN: ${DISCORD_TOKEN:?set DISCORD_TOKEN}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HEALTHCHECK_FILE: /tmp/kakuzato-bot-ready
    mem_limit: ${BOT_MEMORY_LIMIT:-512m}
    cpus: '${BOT_CPUS:-0.50}'
    deploy:
      resources:
        limits:
          memory: ${BOT_MEMORY_LIMIT:-512m}
          cpus: '${BOT_CPUS:-0.50}'
    healthcheck:
      test: ['CMD', 'node', 'dist/app/healthcheck.js']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 30s

volumes:
  postgres-data:
